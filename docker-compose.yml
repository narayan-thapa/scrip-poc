# Local infrastructure for the NEPSE Signal Platform (Stage 0).
#   docker compose up -d
# Defaults match backend/src/main/resources/application.properties.
services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: nepse-postgres
    environment:
      POSTGRES_DB: nepse
      POSTGRES_USER: nepse
      POSTGRES_PASSWORD: nepse
    ports:
      - "5432:5432"
    volumes:
      - nepse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepse -d nepse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nepse-redis
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - nepse-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object storage for immutable raw-CSV archival (Stage 2). S3-compatible.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: nepse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nepse
      MINIO_ROOT_PASSWORD: nepse-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nepse-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nepse-pgdata:
  nepse-redisdata:
  nepse-miniodata:
