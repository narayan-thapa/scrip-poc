spring.application.name=nepse-signal-platform

# Java 25 virtual threads: blocking ingestion + per-symbol indicator work scale
# without a reactive rewrite.
spring.threads.virtual.enabled=true

# --- Datasource (PostgreSQL / TimescaleDB) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nepse}
spring.datasource.username=${DB_USERNAME:nepse}
spring.datasource.password=${DB_PASSWORD:nepse}

# Schema is owned by Flyway, not Hibernate.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Spring Batch ---
# Do NOT auto-run Job beans at startup: the EOD job is launched explicitly by the
# scheduler/admin trigger (Stage 10). Batch metadata schema is created on first run.
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
# Per-request correlation id (set by CorrelationIdFilter into the MDC) on every log line.
logging.pattern.level=%5p [%X{correlationId:-}]
management.endpoint.health.show-details=when-authorized

# --- Ingestion ---
# Multipart limits must accommodate the per-file and per-batch caps in
# nepse.ingestion.* (max-request-size covers a whole batch upload).
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=1200MB
nepse.ingestion.archive-root=./data/raw-archive
nepse.ingestion.amount-tolerance=0.5
# nepse.ingestion.webhook-secret must be set (env/secret manager) to enable the webhook.

# --- Market data aggregation ---
# Volume-profile bin count and value-area share (§6.2); intraday bucket width.
nepse.marketdata.volume-profile-bins=24
nepse.marketdata.value-area-fraction=0.70
nepse.marketdata.intraday-interval-min=15
nepse.marketdata.intraday-enabled=true

# --- Indicator engine ---
# Warm-up history per symbol (a 200-period EMA needs ~200 prior bars). Redis caches
# ad-hoc parametrized series; it degrades gracefully to recompute when unavailable.
nepse.indicator.lookback-bars=260
nepse.indicator.cache-enabled=true
nepse.indicator.cache-ttl-seconds=3600

# --- Signal engine ---
# Warm-up history per symbol for the strategies' indicators; confluence action
# thresholds (§6.4): BUY at score >= buy-threshold, SELL at <= -sell-threshold.
# Per-strategy weights live in the strategy_config table (tunable via the API).
nepse.signal.lookback-bars=260
nepse.signal.buy-threshold=35
nepse.signal.sell-threshold=35
nepse.signal.max-top-reasons=3

# --- Backtesting ---
# Cost-model rates (§7.2) are ILLUSTRATIVE — set exact values from current
# SEBON/NEPSE circulars. Rates are fractions; charges/capital are NPR. A run may
# override the whole cost model in its request body.
nepse.backtest.starting-capital=1000000
nepse.backtest.warmup-bars=260
nepse.backtest.sebon-fee-rate=0.00015
nepse.backtest.dp-charge-per-scrip=25
nepse.backtest.capital-gains-tax-rate=0.075
nepse.backtest.slippage-bps=5
# Trailing window (days) auto-backtested for the BUY list on each SignalsGeneratedEvent.
nepse.backtest.refresh-window-days=365

# --- Security (Stage 8) ---
# JWT signing secret MUST be provided via env/secret manager in production (>= 32 bytes).
# When blank, an ephemeral key is generated at startup (dev only) and tokens reset on restart.
nepse.security.jwt-secret=${NEPSE_SECURITY_JWT_SECRET:}
nepse.security.access-token-ttl-seconds=900
nepse.security.refresh-token-ttl-days=14
# CORS is locked to this single origin; the refresh cookie is Secure unless overridden for local http.
nepse.security.cors-allowed-origin=${NEPSE_CORS_ORIGIN:http://localhost:4200}
nepse.security.cookie-secure=${NEPSE_COOKIE_SECURE:true}
nepse.security.login-rate-limit-per-minute=10

# --- Orchestration (Stage 10) ---
# The daily 15:01 NPT trigger is opt-in (enable in the deployed env, not dev/test).
# Replicated deployments should add ShedLock so only one node launches the job.
nepse.orchestration.schedule-enabled=${NEPSE_SCHEDULE_ENABLED:false}
nepse.orchestration.cron=0 1 15 * * *
nepse.orchestration.recent-jobs=10

# --- Reference: trading-calendar seeding window ---
# start-date should precede the earliest date you intend to backfill so look-back
# warm-up windows have lead-in trading days.
nepse.calendar.start-date=2015-01-01
nepse.calendar.forward-days=400
