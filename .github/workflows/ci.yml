name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Fast gates: compile + ArchUnit module-boundary rules + Ta4j Java-25 smoke + web-slice test.
  # No Docker required (the integration slice is excluded via the `integration` JUnit tag).
  backend-unit:
    name: Backend · unit / arch / ta4j
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x ./mvnw
      - name: Test (excludes Docker integration slice)
        run: ./mvnw -B test

  # Full context boot against a real Postgres via Testcontainers (Docker is available on the runner).
  backend-integration:
    name: Backend · integration (Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x ./mvnw
      - name: Verify (runs all tags, incl. integration)
        run: ./mvnw -B verify -Dtest.excludedGroups=

  frontend:
    name: Frontend · build / vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:ci
